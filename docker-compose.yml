version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: telemetria
    ports:
      - "5432:5432"

  api:
    build: .
    command: uvicorn dashboard:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - db

  gerador:
    build: .
    command: python gerador_tempo_real.py
    depends_on:
      - db
      - api